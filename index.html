<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Core | Null</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" id="favicon" href="stable-icon.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body id="core-body">
    <div id="void-cracks"></div>
    <div id="chat-container">
        <div id="core-caption">
            <div id="logic-orb"></div> <span id="caption-text">INTELLIGENCE CORE | STABLE</span>
        </div>

        <div id="chat-display">
            <div class="message null-msg">Core Online. Awaiting command...</div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type a command..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="processInput()">Send</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
